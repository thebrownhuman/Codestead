name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  application:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22.23.1
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run security:dependencies:known
      - run: npm run security:secrets
      - run: npm run security:encoding
      - run: npm run security:api-surface
      - run: npm run architecture:check
      - run: npm run ai:eval -- --check
      - run: npm run test:auth-boundary
      - run: npm run test:coverage
      - run: npm run content:validate
      - run: npm run dsa:parity:check
      - run: npm run c-cpp:executable:check
      - run: npm run java-python:executable:check
      - run: npm run ai-code:executable:check
      - run: npm run web:executable:check
      - run: npm run audit:release
      - run: npm run evidence:verify
      - run: npm run build
      - run: npm audit --audit-level=moderate
      - run: node infra/tests/validate-static.mjs
      - run: bash -n scripts/backup/*.sh infra/docker/entrypoint.sh infra/ops/*.sh infra/runner/*.sh infra/tests/*.sh
      - run: bash infra/tests/runner-reconciliation.test.sh
      - run: bash infra/tests/runtime-config.test.sh
      - run: docker compose --env-file infra/env/compose.env.example config --quiet
      - run: node infra/tests/validate-compose.mjs
      - run: docker build --pull=false --tag learncoding-app:ci .
      - run: docker build --pull=false --target regrade-worker --tag learncoding-regrade-worker:ci .

  backup-safety:
    # 60 minutes covers the complete unfiltered backup publication suite and adjacent gates.
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22.23.1
          cache: npm
      - run: node infra/tests/backup-ci-registration.test.mjs
      - run: bash -n scripts/backup/*.sh infra/tests/*.sh
      - run: python3 -m py_compile scripts/backup/run-managed-deadline.py infra/tests/managed-deadline-stop-channel-linux.py
      - run: npm ci
      - run: bash infra/tests/backup-config.test.sh
      - run: bash infra/tests/restore-path-safety.test.sh
      - run: bash infra/tests/managed-deadline-registration.test.sh
      - run: bash infra/tests/managed-deadline-linux.test.sh
      - run: bash infra/tests/credential-probe-cleanup.test.sh
      - run: bash infra/tests/backup-consistency.test.sh
      - run: bash infra/tests/backup-retention.test.sh
      - run: bash infra/tests/emergency-backup-atomicity.test.sh
      - run: bash infra/tests/backup-publication.test.sh

  backup-production-e2e:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - run: CODESTEAD_DISPOSABLE_HOST=1 bash infra/tests/backup-production-e2e.test.sh

  runner:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    defaults:
      run:
        working-directory: services/runner
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22.23.1
          cache: npm
          cache-dependency-path: services/runner/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - name: Set up Docker with containerd image store
        uses: docker/setup-docker-action@v5
        with:
          daemon-config: |
            {
              "features": {
                "containerd-snapshotter": true
              }
            }
      - run: npm run runtime:build
      - run: npm run runtime:test
      - run: npm audit --omit=dev --audit-level=high

  postgres-integration:
    needs: application
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22.23.1
          cache: npm
      - run: npm ci
      - run: npm run test:integration

  curriculum-runtime:
    needs: application
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22.23.1
          cache: npm
      - run: npm ci
      - run: npm ci
        working-directory: services/runner
      - name: Set up Docker with containerd image store
        uses: docker/setup-docker-action@v5
        with:
          daemon-config: |
            {
              "features": {
                "containerd-snapshotter": true
              }
            }
      - run: npm run runtime:build
        working-directory: services/runner
      - run: npm run runtime:inspect
        working-directory: services/runner
      - run: npm run runtime:record
        working-directory: services/runner
      - run: npx playwright install --with-deps chromium
      - run: npm run dsa:parity:verify
      - run: npm run c-cpp:executable:verify
      - run: npm run java-python:executable:verify
      - run: npm run ai-code:executable:verify
      - run: npm run web:executable:verify

  browser:
    needs: application
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22.23.1
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium firefox webkit
      - run: npm run sync:monaco
      - run: npm run test:e2e
