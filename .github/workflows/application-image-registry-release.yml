name: Application image registry release

on:
  workflow_dispatch:
    inputs:
      release:
        description: Immutable release label (for example 20260719T120000Z-90a441c)
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: application-image-registry-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    environment: application-image-registry
    env:
      APP_IMAGE_PUSH: "1"
      APP_IMAGE_RELEASE: ${{ inputs.release }}
      APP_IMAGE_REGISTRY: ghcr.io/thebrownhuman/codestead
      APP_IMAGE_SOURCE_REPOSITORY: ${{ github.server_url }}/${{ github.repository }}
      APP_IMAGE_SOURCE_REVISION: ${{ github.sha }}
      APP_IMAGE_COSIGN_CERTIFICATE_IDENTITY: https://github.com/${{ github.repository }}/.github/workflows/application-image-registry-release.yml@refs/heads/main
      APP_IMAGE_COSIGN_CERTIFICATE_OIDC_ISSUER: https://token.actions.githubusercontent.com
      APP_IMAGE_TRIVY_CACHE_DIR: ${{ runner.temp }}/application-image-trivy-cache
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.23.1
          cache: npm
      - run: npm ci
      - name: Set up Docker with containerd image store
        uses: docker/setup-docker-action@6d7cfa65f60a9dda7b46e5513fa982536f3c9877 # v5.3.0
        with:
          daemon-config: |
            {
              "features": {
                "containerd-snapshotter": true
              }
            }
      - name: Authenticate to GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Install ORAS
        uses: oras-project/setup-oras@22ce207df3b08e061f537244349aac6ae1d214f6 # v1
        with:
          version: 1.3.0
      - name: Install Cosign
        uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1
        with:
          cosign-release: v3.0.2
      - uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514 # v0.2.6
        with:
          version: 0.69.3
      - run: npm run app-images:test
      - run: npm run app-images:build
      - run: npm run app-images:inspect
      - run: npm run app-images:sign
      - run: trivy image --cache-dir "$APP_IMAGE_TRIVY_CACHE_DIR" --download-db-only
      - run: trivy image --cache-dir "$APP_IMAGE_TRIVY_CACHE_DIR" --download-java-db-only
      - run: npm run app-images:scan
      - run: npm run app-images:record
      - name: Upload application image registry evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: application-image-registry-${{ inputs.release }}
          path: |
            dist/application-images/application-inspection.json
            dist/application-images/application-signing.json
            dist/application-images/application-images.env
            dist/application-images/application-images.json
            dist/application-images/application-security/**
            dist/application-images/.application-security.failed-*/**
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 30
