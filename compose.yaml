name: learncoding

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-hardened: &hardened
  init: true
  read_only: true
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true

x-codestead-managed: &codestead-managed
  labels:
    com.centurylinklabs.watchtower.enable: "false"

services:
  postgres:
    <<: *codestead-managed
    platform: ${DEPLOY_PLATFORM:-linux/amd64}
    image: ${POSTGRES_IMAGE:?Set POSTGRES_IMAGE to a reviewed PostgreSQL 17 image tag or digest}
    user: "${POSTGRES_UID:?Set POSTGRES_UID from the pinned PostgreSQL image}:${POSTGRES_GID:?Set POSTGRES_GID from the pinned PostgreSQL image}"
    command:
      - postgres
      - -c
      - fsync=on
      - -c
      - synchronous_commit=on
      - -c
      - full_page_writes=on
      - -c
      - unix_socket_directories=/run/learncoding-postgres
      - -c
      - unix_socket_permissions=0700
    restart: unless-stopped
    stop_grace_period: 2m
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-learncoding}
      POSTGRES_USER: ${POSTGRES_USER:-learncoding}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_INITDB_ARGS: --data-checksums --encoding=UTF8
    secrets:
      - postgres_password
    group_add:
      - $SECRETS_GID
    cap_drop:
      - ALL
    volumes:
      - type: bind
        source: ${LEARN_DATA_ROOT:-/srv/learncoding}/postgres
        target: /var/lib/postgresql/data
      - type: bind
        source: /run/learncoding-postgres
        target: /run/learncoding-postgres
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /var/run/postgresql:rw,noexec,nosuid,nodev,size=16m
      - /tmp:rw,noexec,nosuid,nodev,size=32m
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h /run/learncoding-postgres -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    shm_size: 256mb
    mem_limit: 6g
    cpus: 2.5
    pids_limit: 256
    logging: *default-logging

  database-role-bootstrap:
    profiles: ["operations"]
    platform: ${DEPLOY_PLATFORM:-linux/amd64}
    image: ${APP_OPERATIONS_IMAGE:?Set APP_OPERATIONS_IMAGE to a reviewed immutable operations image digest}
    build:
      context: .
      target: operations
    command: ["node", "/app/scripts/bootstrap-database-roles.mjs"]
    restart: "no"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-learncoding}
      POSTGRES_USER: ${POSTGRES_USER:-learncoding}
      DATABASE_BOOTSTRAP_URL_FILE: /run/secrets/database_bootstrap_url
      DATABASE_APP_URL_FILE: /run/secrets/database_app_url
      DATABASE_MIGRATOR_URL_FILE: /run/secrets/database_migrator_url
      DATABASE_WORKER_URL_FILE: /run/secrets/database_worker_url
      DATABASE_OPS_URL_FILE: /run/secrets/database_ops_url
    secrets:
      - source: database_bootstrap_url
        target: database_bootstrap_url
      - source: database_url
        target: database_app_url
      - source: database_migrator_url
        target: database_migrator_url
      - source: database_worker_url
        target: database_worker_url
      - source: database_ops_url
        target: database_ops_url
    group_add:
      - $SECRETS_GID
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - data
    <<: [*hardened, *codestead-managed]
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m
    mem_limit: 256m
    cpus: 0.25
    pids_limit: 32
    logging: *default-logging

  database-negative-probes:
    profiles: ["operations"]
    platform: ${DEPLOY_PLATFORM:-linux/amd64}
    image: ${APP_OPERATIONS_IMAGE:?Set APP_OPERATIONS_IMAGE to a reviewed immutable operations image digest}
    build:
      context: .
      target: operations
    command: ["node", "/app/scripts/verify-database-role-boundaries.mjs"]
    restart: "no"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-learncoding}
      DATABASE_URL_FILE: /run/secrets/database_url
      DATABASE_MIGRATOR_URL_FILE: /run/secrets/database_migrator_url
      DATABASE_WORKER_URL_FILE: /run/secrets/database_worker_url
      DATABASE_OPS_URL_FILE: /run/secrets/database_ops_url
    secrets:
      - source: database_url
        target: database_url
      - source: database_migrator_url
        target: database_migrator_url
      - source: database_worker_url
        target: database_worker_url
      - source: database_ops_url
        target: database_ops_url
    group_add:
      - $SECRETS_GID
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - data
    <<: [*hardened, *codestead-managed]
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m
    mem_limit: 256m
    cpus: 0.25
    pids_limit: 32
    logging: *default-logging

  database-boundary-verifier:
    profiles: ["operations"]
    platform: ${DEPLOY_PLATFORM:-linux/amd64}
    image: ${APP_OPERATIONS_IMAGE:?Set APP_OPERATIONS_IMAGE to a reviewed immutable operations image digest}
    build:
      context: .
      target: operations
    command: ["node", "/app/scripts/verify-database-role-boundaries.mjs", "--require-application-objects"]
    restart: "no"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-learncoding}
      DATABASE_URL_FILE: /run/secrets/database_url
      DATABASE_MIGRATOR_URL_FILE: /run/secrets/database_migrator_url
      DATABASE_WORKER_URL_FILE: /run/secrets/database_worker_url
      DATABASE_OPS_URL_FILE: /run/secrets/database_ops_url
    secrets:
      - source: database_url
        target: database_url
      - source: database_migrator_url
        target: database_migrator_url
      - source: database_worker_url
        target: database_worker_url
      - source: database_ops_url
        target: database_ops_url
    group_add:
      - $SECRETS_GID
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - data
    <<: [*hardened, *codestead-managed]
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m
    mem_limit: 256m
    cpus: 0.25
    pids_limit: 32
    logging: *default-logging

  migrate:
    profiles: ["operations"]
    platform: ${DEPLOY_PLATFORM:-linux/amd64}
    image: ${APP_TOOLING_IMAGE:?Set APP_TOOLING_IMAGE to a reviewed immutable tooling image digest}
    build:
      context: .
      target: tooling
    environment:
      DATABASE_URL_FILE: /run/secrets/database_url
    secrets:
      - source: database_migrator_url
        target: database_url
    group_add:
      - $SECRETS_GID
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - data
    <<: [*hardened, *codestead-managed]
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    mem_limit: 1g
    cpus: 1.0
    pids_limit: 128
    logging: *default-logging
    restart: "no"

  app:
    platform: ${DEPLOY_PLATFORM:-linux/amd64}
    image: ${APP_RUNTIME_IMAGE:?Set APP_RUNTIME_IMAGE to a reviewed immutable runtime image digest}
    user: "1000:1000"
    build:
      context: .
      target: runtime
    restart: unless-stopped
    stop_grace_period: 1m
    environment:
      NODE_ENV: production
      AUTH_REQUIRED: "true"
      REQUIRE_APP_SECRETS: "1"
      APP_NAME: ${APP_NAME:-Codestead}
      APP_URL: ${APP_URL:?Set APP_URL to the public HTTPS origin}
      NEXT_PUBLIC_APP_URL: ${APP_URL:?Set APP_URL to the public HTTPS origin}
      SOURCE_CODE_URL: ${SOURCE_CODE_URL:?Set SOURCE_CODE_URL to this deployment's corresponding source}
      DATABASE_URL_FILE: /run/secrets/database_url
      BETTER_AUTH_SECRET_FILE: /run/secrets/better_auth_secret
      LOST_DEVICE_PROOF_KEY_FILE: /run/secrets/lost_device_proof_key
      DELETION_TOMBSTONE_KEY_FILE: /run/secrets/deletion_tombstone_key
      CREDENTIAL_MASTER_KEY_FILE: /run/secrets/credential_master_key
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET_FILE: /run/secrets/google_client_secret
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      RUNNER_BASE_URL: http://runner-egress-gateway:4100
      RUNNER_SHARED_SECRET_FILE: /run/secrets/runner_shared_secret
      RUNNER_MAX_CONCURRENCY: "2"
      UPLOADS_ENABLED: ${UPLOADS_ENABLED:-false}
      OBJECT_STORAGE_PATH: /var/lib/learncoding/objects
      MAIL_ADAPTER: ${MAIL_ADAPTER:-outbox}
      MAIL_FROM: ${MAIL_FROM:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SENTRY_DSN: ${SENTRY_DSN:-}
    secrets:
      - source: database_url
        target: database_url
      - better_auth_secret
      - lost_device_proof_key
      - deletion_tombstone_key
      - credential_master_key
      - google_client_secret
      - runner_shared_secret
    group_add:
      - $SECRETS_GID
    volumes:
      - type: bind
        source: ${LEARN_DATA_ROOT:-/srv/learncoding}/next-cache
        target: /app/.next/cache
      - type: bind
        source: ${LEARN_DATA_ROOT:-/srv/learncoding}/app-data/objects
        target: /var/lib/learncoding/objects
        read_only: false
    depends_on:
      postgres:
        condition: service_healthy
      runner-egress-gateway:
        condition: service_healthy
    networks:
      frontend:
        interface_name: frontend
        gw_priority: 100
      data:
        interface_name: data
      runner-client:
        interface_name: runner-client
    <<: [*hardened, *codestead-managed]
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=128m
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health/ready', { redirect: 'manual' }).then((response) => { if (response.status !== 200) process.exit(1); }).catch(() => process.exit(1));"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: 4g
    cpus: 2.0
    pids_limit: 256
    logging: *default-logging

  runner-egress-gateway:
    platform: ${DEPLOY_PLATFORM:-linux/amd64}
    image: ${APP_RUNTIME_IMAGE:?Set APP_RUNTIME_IMAGE to a reviewed immutable runtime image digest}
    entrypoint: []
    command: ["node", "/app/runner-gateway/server.mjs"]
    user: "1000:1000"
    restart: unless-stopped
    stop_grace_period: 15s
    environment:
      RUNNER_GATEWAY_UPSTREAM: ${RUNNER_BASE_URL:?Set RUNNER_BASE_URL to the isolated runner VM private URL}
      RUNNER_GATEWAY_LISTEN_HOST: "172.29.41.2"
      RUNNER_GATEWAY_LISTEN_PORT: "4100"
    networks:
      runner-client:
        interface_name: runner-client
        ipv4_address: 172.29.41.2
      runner-egress:
        interface_name: runner-egress
        ipv4_address: 172.29.40.2
        gw_priority: 100
    <<: [*hardened, *codestead-managed]
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=8m
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://172.29.41.2:4100/__codestead_runner_gateway_health', { redirect: 'manual' }).then((response) => { if (response.status !== 204) process.exit(1); }).catch(() => process.exit(1));"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 128m
    cpus: 0.25
    pids_limit: 32
    logging: *default-logging

  mail-worker:
    platform: ${DEPLOY_PLATFORM:-linux/amd64}
    image: ${APP_WORKER_IMAGE:?Set APP_WORKER_IMAGE to a reviewed immutable worker image digest}
    build:
      context: .
      target: worker
    restart: unless-stopped
    stop_grace_period: 1m
    environment:
      NODE_ENV: production
      DATABASE_URL_FILE: /run/secrets/database_url
      LOST_DEVICE_PROOF_KEY_FILE: /run/secrets/lost_device_proof_key
      REQUIRE_LOST_DEVICE_PROOF_KEY: "1"
      APP_URL: ${APP_URL:?Set APP_URL to the public HTTPS origin}
      MAIL_ADAPTER: ${MAIL_ADAPTER:-console}
      MAIL_FROM: ${MAIL_FROM:-Codestead <noreply@example.com>}
      MAIL_OUTBOX_PHASE: ${MAIL_OUTBOX_PHASE:?Set MAIL_OUTBOX_PHASE to the reviewed rollout phase}
      OUTBOX_WORKER_MODE: ${OUTBOX_WORKER_MODE:?Set OUTBOX_WORKER_MODE to the reviewed claimant}
      GMAIL_CLIENT_ID_FILE: /run/secrets/gmail_client_id
      GMAIL_CLIENT_SECRET_FILE: /run/secrets/gmail_client_secret
      GMAIL_REFRESH_TOKEN_FILE: /run/secrets/gmail_refresh_token
      GMAIL_OAUTH_SCOPES: ${GMAIL_OAUTH_SCOPES:-}
      GMAIL_REQUEST_TIMEOUT_MS: ${GMAIL_REQUEST_TIMEOUT_MS:-10000}
      OUTBOX_POLL_SECONDS: ${OUTBOX_POLL_SECONDS:-60}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WORKER_HEALTH_ID: mail-worker
      WORKER_HEALTH_MAX_AGE_SECONDS: "600"
      WORKER_HEALTH_MAX_FAILURES: "2"
    secrets:
      - source: database_worker_url
        target: database_url
      - lost_device_proof_key
      - gmail_client_id
      - gmail_client_secret
      - gmail_refresh_token
    group_add:
      - $SECRETS_GID
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - data
      - mail-egress
    <<: [*hardened, *codestead-managed]
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m
    healthcheck:
      test: ["CMD", "node", "--import", "tsx", "/app/scripts/check-worker-health.ts"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 2m
    mem_limit: 512m
    cpus: 0.5
    pids_limit: 64
    logging: *default-logging

  reward-worker:
    platform: ${DEPLOY_PLATFORM:-linux/amd64}
    image: ${APP_WORKER_IMAGE:?Set APP_WORKER_IMAGE to a reviewed immutable worker image digest}
    build:
      context: .
      target: worker
    command: ["node", "--import", "tsx", "/app/scripts/process-rewards.ts"]
    restart: unless-stopped
    stop_grace_period: 1m
    environment:
      NODE_ENV: production
      DATABASE_URL_FILE: /run/secrets/database_url
      REWARD_POLL_SECONDS: ${REWARD_POLL_SECONDS:-5}
      REWARD_BATCH_SIZE: ${REWARD_BATCH_SIZE:-20}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WORKER_HEALTH_ID: reward-worker
      WORKER_HEALTH_MAX_AGE_SECONDS: "120"
      WORKER_HEALTH_MAX_FAILURES: "2"
    secrets:
      - source: database_worker_url
        target: database_url
    group_add:
      - $SECRETS_GID
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - data
    <<: [*hardened, *codestead-managed]
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m
    healthcheck:
      test: ["CMD", "node", "--import", "tsx", "/app/scripts/check-worker-health.ts"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 1m
    mem_limit: 256m
    cpus: 0.25
    pids_limit: 64
    logging: *default-logging

  regrade-worker:
    platform: ${DEPLOY_PLATFORM:-linux/amd64}
    image: ${APP_REGRADE_WORKER_IMAGE:?Set APP_REGRADE_WORKER_IMAGE to a reviewed immutable regrade worker image digest}
    build:
      context: .
      target: regrade-worker
    restart: unless-stopped
    stop_grace_period: 1m
    environment:
      NODE_ENV: production
      DATABASE_URL_FILE: /run/secrets/database_url
      APP_URL: ${APP_URL:?Set APP_URL to the public HTTPS origin}
      RUNNER_BASE_URL: http://runner-egress-gateway:4100
      RUNNER_SHARED_SECRET_FILE: /run/secrets/runner_shared_secret
      REGRADE_POLL_SECONDS: ${REGRADE_POLL_SECONDS:-10}
      REGRADE_BATCH_SIZE: ${REGRADE_BATCH_SIZE:-2}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WORKER_HEALTH_ID: regrade-worker
      WORKER_HEALTH_MAX_AGE_SECONDS: "600"
      WORKER_HEALTH_MAX_FAILURES: "2"
    secrets:
      - source: database_worker_url
        target: database_url
      - runner_shared_secret
    group_add:
      - $SECRETS_GID
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      data:
        interface_name: data
      runner-client:
        interface_name: runner-client
    <<: [*hardened, *codestead-managed]
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m
    healthcheck:
      test: ["CMD", "node", "--import", "tsx", "/app/scripts/check-worker-health.ts"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 2m
    mem_limit: 512m
    cpus: 0.5
    pids_limit: 64
    logging: *default-logging

  exam-finalization-worker:
    platform: ${DEPLOY_PLATFORM:-linux/amd64}
    image: ${APP_REGRADE_WORKER_IMAGE:?Set APP_REGRADE_WORKER_IMAGE to a reviewed immutable regrade worker image digest}
    build:
      context: .
      target: regrade-worker
    command: ["node", "--import", "tsx", "/app/scripts/process-exam-finalizations.ts"]
    restart: unless-stopped
    stop_grace_period: 1m
    environment:
      NODE_ENV: production
      DATABASE_URL_FILE: /run/secrets/database_url
      APP_URL: ${APP_URL:?Set APP_URL to the public HTTPS origin}
      RUNNER_BASE_URL: http://runner-egress-gateway:4100
      RUNNER_SHARED_SECRET_FILE: /run/secrets/runner_shared_secret
      EXAM_FINALIZATION_POLL_SECONDS: ${EXAM_FINALIZATION_POLL_SECONDS:-5}
      EXAM_FINALIZATION_BATCH_SIZE: ${EXAM_FINALIZATION_BATCH_SIZE:-2}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WORKER_HEALTH_ID: exam-finalization-worker
      WORKER_HEALTH_MAX_AGE_SECONDS: "600"
      WORKER_HEALTH_MAX_FAILURES: "2"
    secrets:
      - source: database_worker_url
        target: database_url
      - runner_shared_secret
    group_add:
      - $SECRETS_GID
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      data:
        interface_name: data
      runner-client:
        interface_name: runner-client
    <<: [*hardened, *codestead-managed]
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m
    healthcheck:
      test: ["CMD", "node", "--import", "tsx", "/app/scripts/check-worker-health.ts"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 2m
    mem_limit: 512m
    cpus: 0.5
    pids_limit: 64
    logging: *default-logging

  practice-runner-recovery-worker:
    platform: ${DEPLOY_PLATFORM:-linux/amd64}
    image: ${APP_REGRADE_WORKER_IMAGE:?Set APP_REGRADE_WORKER_IMAGE to a reviewed immutable regrade worker image digest}
    build:
      context: .
      target: regrade-worker
    command: ["node", "--import", "tsx", "/app/scripts/process-practice-runner-recoveries.ts"]
    restart: unless-stopped
    stop_grace_period: 1m
    environment:
      NODE_ENV: production
      DATABASE_URL_FILE: /run/secrets/database_url
      RUNNER_BASE_URL: http://runner-egress-gateway:4100
      RUNNER_SHARED_SECRET_FILE: /run/secrets/runner_shared_secret
      PRACTICE_RECOVERY_POLL_SECONDS: ${PRACTICE_RECOVERY_POLL_SECONDS:-5}
      PRACTICE_RECOVERY_BATCH_SIZE: ${PRACTICE_RECOVERY_BATCH_SIZE:-2}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WORKER_HEALTH_ID: practice-runner-recovery-worker
      WORKER_HEALTH_MAX_AGE_SECONDS: "600"
      WORKER_HEALTH_MAX_FAILURES: "2"
    secrets:
      - source: database_worker_url
        target: database_url
      - runner_shared_secret
    group_add:
      - $SECRETS_GID
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      data:
        interface_name: data
      runner-client:
        interface_name: runner-client
    <<: [*hardened, *codestead-managed]
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m
    healthcheck:
      test: ["CMD", "node", "--import", "tsx", "/app/scripts/check-worker-health.ts"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 2m
    mem_limit: 384m
    cpus: 0.5
    pids_limit: 64
    logging: *default-logging

  project-review-correction-worker:
    platform: ${DEPLOY_PLATFORM:-linux/amd64}
    image: ${APP_PROJECT_REVIEW_WORKER_IMAGE:?Set APP_PROJECT_REVIEW_WORKER_IMAGE to a reviewed immutable project review worker image digest}
    build:
      context: .
      target: project-review-correction-worker
    restart: unless-stopped
    stop_grace_period: 1m
    environment:
      NODE_ENV: production
      DATABASE_URL_FILE: /run/secrets/database_url
      PROJECT_REVIEW_CORRECTION_POLL_SECONDS: ${PROJECT_REVIEW_CORRECTION_POLL_SECONDS:-10}
      PROJECT_REVIEW_CORRECTION_BATCH_SIZE: ${PROJECT_REVIEW_CORRECTION_BATCH_SIZE:-2}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WORKER_HEALTH_ID: project-review-correction-worker
      WORKER_HEALTH_MAX_AGE_SECONDS: "600"
      WORKER_HEALTH_MAX_FAILURES: "2"
    secrets:
      - source: database_worker_url
        target: database_url
    group_add:
      - $SECRETS_GID
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - data
      - github-egress
    <<: [*hardened, *codestead-managed]
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m
    healthcheck:
      test: ["CMD", "node", "--import", "tsx", "/app/scripts/check-worker-health.ts"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 2m
    mem_limit: 512m
    cpus: 0.5
    pids_limit: 64
    logging: *default-logging

  clamav:
    profiles: ["uploads"]
    <<: *codestead-managed
    platform: ${DEPLOY_PLATFORM:-linux/amd64}
    image: ${CLAMAV_IMAGE:-clamav/clamav:pilot-disabled}
    init: true
    restart: unless-stopped
    volumes:
      - type: volume
        source: clamav-signatures
        target: /var/lib/clamav
    networks:
      - scanner
      - signature-egress
    read_only: true
    cap_drop:
      - ALL
    # The upstream entrypoint drops to the clamav account after preparing its
    # writable signature/runtime directories; no network or admin capability is
    # retained by clamd itself.
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /run/clamav:rw,noexec,nosuid,nodev,size=16m,uid=100,gid=101
      - /var/log/clamav:rw,noexec,nosuid,nodev,size=32m,uid=100,gid=101
      - /tmp:rw,noexec,nosuid,nodev,size=64m
    healthcheck:
      test: ["CMD", "clamdscan", "--ping", "1", "--wait", "5"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s
    # ClamAV's official container guidance warns that 2 GB may be
    # insufficient once the signature databases are loaded.
    mem_limit: 4g
    cpus: 1.5
    pids_limit: 256
    logging: *default-logging

  scan-worker:
    profiles: ["uploads"]
    platform: ${DEPLOY_PLATFORM:-linux/amd64}
    image: ${APP_SCANNER_WORKER_IMAGE:?Set APP_SCANNER_WORKER_IMAGE to a reviewed immutable scanner worker image digest}
    user: "1000:1000"
    build:
      context: .
      target: scanner-worker
    restart: unless-stopped
    stop_grace_period: 1m
    environment:
      NODE_ENV: production
      DATABASE_URL_FILE: /run/secrets/database_url
      OBJECT_STORAGE_PATH: /var/lib/learncoding/objects
      UPLOADS_ENABLED: "true"
      CLAMD_HOST: clamav
      CLAMD_PORT: "3310"
      CLAMD_TIMEOUT_SECONDS: ${CLAMD_TIMEOUT_SECONDS:-120}
      UPLOAD_SCAN_POLL_SECONDS: ${UPLOAD_SCAN_POLL_SECONDS:-10}
      UPLOAD_SCAN_BATCH_SIZE: ${UPLOAD_SCAN_BATCH_SIZE:-10}
      UPLOAD_SCAN_LEASE_SECONDS: ${UPLOAD_SCAN_LEASE_SECONDS:-180}
      UPLOAD_SCAN_MAX_ATTEMPTS: ${UPLOAD_SCAN_MAX_ATTEMPTS:-8}
      UPLOAD_SCAN_RETRY_BASE_SECONDS: ${UPLOAD_SCAN_RETRY_BASE_SECONDS:-5}
      UPLOAD_SCAN_RETRY_MAX_SECONDS: ${UPLOAD_SCAN_RETRY_MAX_SECONDS:-900}

      LOG_LEVEL: ${LOG_LEVEL:-info}
      WORKER_HEALTH_ID: scan-worker
      WORKER_HEALTH_MAX_AGE_SECONDS: "1800"
      WORKER_HEALTH_MAX_FAILURES: "2"
    secrets:
      - source: database_worker_url
        target: database_url
    group_add:
      - $SECRETS_GID
    volumes:
      - type: bind
        source: ${LEARN_DATA_ROOT:-/srv/learncoding}/app-data/objects
        target: /var/lib/learncoding/objects
        read_only: true
    depends_on:
      postgres:
        condition: service_healthy
      clamav:
        condition: service_healthy
    networks:
      - data
      - scanner
    <<: [*hardened, *codestead-managed]
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m
    healthcheck:
      test: ["CMD", "node", "--import", "tsx", "/app/scripts/check-worker-health.ts"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 3m
    mem_limit: 512m
    cpus: 0.5
    pids_limit: 64
    logging: *default-logging

  file-erasure-worker:
    platform: ${DEPLOY_PLATFORM:-linux/amd64}
    image: ${APP_WORKER_IMAGE:?Set APP_WORKER_IMAGE to a reviewed immutable worker image digest}
    user: "1000:1000"
    build:
      context: .
      target: worker
    command: ["node", "--import", "tsx", "/app/scripts/process-file-erasures.ts"]
    restart: unless-stopped
    stop_grace_period: 1m
    environment:
      NODE_ENV: production
      DATABASE_URL_FILE: /run/secrets/database_url
      OBJECT_STORAGE_PATH: /var/lib/learncoding/objects
      FILE_ERASURE_POLL_SECONDS: ${FILE_ERASURE_POLL_SECONDS:-10}
      FILE_ERASURE_BATCH_SIZE: ${FILE_ERASURE_BATCH_SIZE:-25}
      FILE_ERASURE_LEASE_SECONDS: ${FILE_ERASURE_LEASE_SECONDS:-300}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WORKER_HEALTH_ID: file-erasure-worker
      WORKER_HEALTH_MAX_AGE_SECONDS: "1800"
      WORKER_HEALTH_MAX_FAILURES: "2"
    secrets:
      - source: database_worker_url
        target: database_url
    group_add:
      - $SECRETS_GID
    volumes:
      - type: bind
        source: ${LEARN_DATA_ROOT:-/srv/learncoding}/app-data/objects
        target: /var/lib/learncoding/objects
        read_only: false
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - data
    <<: [*hardened, *codestead-managed]
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m
    healthcheck:
      test: ["CMD", "node", "--import", "tsx", "/app/scripts/check-worker-health.ts"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 3m
    mem_limit: 256m
    cpus: 0.25
    pids_limit: 64
    logging: *default-logging

  lifecycle:
    profiles: ["operations"]
    platform: ${DEPLOY_PLATFORM:-linux/amd64}
    image: ${APP_OPERATIONS_IMAGE:?Set APP_OPERATIONS_IMAGE to a reviewed immutable operations image digest}
    user: "1000:1000"
    build:
      context: .
      target: operations
    command:
      - node
      - --import
      - tsx
      - /app/scripts/data-lifecycle.ts
      - retention
      - --apply
      - --confirm
      - 2026-07-14.v4
    restart: "no"
    environment:
      NODE_ENV: production
      DATABASE_URL_FILE: /run/secrets/database_url
      OBJECT_STORAGE_PATH: /var/lib/learncoding/objects
    secrets:
      - source: database_ops_url
        target: database_url
    group_add:
      - $SECRETS_GID
    volumes:
      - type: bind
        source: ${LEARN_DATA_ROOT:-/srv/learncoding}/app-data/objects
        target: /var/lib/learncoding/objects
        read_only: false
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - data
    <<: [*hardened, *codestead-managed]
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m
    mem_limit: 512m
    cpus: 0.5
    pids_limit: 64
    logging: *default-logging

  platform-seed:
    profiles: ["operations"]
    platform: ${DEPLOY_PLATFORM:-linux/amd64}
    image: ${APP_OPERATIONS_IMAGE:?Set APP_OPERATIONS_IMAGE to a reviewed immutable operations image digest}
    build:
      context: .
      target: operations
    command: ["node", "--import", "tsx", "/app/scripts/seed-platform.ts"]
    restart: "no"
    environment:
      DATABASE_URL_FILE: /run/secrets/database_url
    secrets:
      - source: database_ops_url
        target: database_url
    group_add:
      - $SECRETS_GID
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - data
    <<: [*hardened, *codestead-managed]
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m
    mem_limit: 512m
    cpus: 0.5
    pids_limit: 64
    logging: *default-logging

  admin-bootstrap:
    profiles: ["operations"]
    platform: ${DEPLOY_PLATFORM:-linux/amd64}
    image: ${APP_OPERATIONS_IMAGE:?Set APP_OPERATIONS_IMAGE to a reviewed immutable operations image digest}
    build:
      context: .
      target: operations
    command: ["node", "--import", "tsx", "/app/scripts/bootstrap-admin.ts"]
    restart: "no"
    environment:
      DATABASE_URL_FILE: /run/secrets/database_url
      BETTER_AUTH_SECRET_FILE: /run/secrets/better_auth_secret
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD_FILE: /run/secrets/bootstrap_admin_password
      APP_URL: ${APP_URL:?Set APP_URL to the public HTTPS origin}
      APP_NAME: ${APP_NAME:-Codestead}
    secrets:
      - source: database_ops_url
        target: database_url
      - better_auth_secret
      - bootstrap_admin_password
    group_add:
      - $SECRETS_GID
    depends_on:
      migrate:
        condition: service_completed_successfully
    networks:
      - data
    <<: [*hardened, *codestead-managed]
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m
    mem_limit: 512m
    cpus: 0.5
    pids_limit: 64
    logging: *default-logging

  cloudflared:
    platform: ${DEPLOY_PLATFORM:-linux/amd64}
    image: ${CLOUDFLARED_IMAGE:?Set CLOUDFLARED_IMAGE to a reviewed cloudflared tag or digest}
    command: tunnel --config /etc/cloudflared/config.yml --no-autoupdate --metrics 0.0.0.0:20241 run
    restart: on-failure:5
    stop_grace_period: 30s
    configs:
      - source: cloudflared_config
        target: /etc/cloudflared/config.yml
        mode: 0444
    secrets:
      - source: cloudflare_tunnel_credentials
        target: cloudflare_tunnel_credentials
    group_add:
      - $SECRETS_GID
    depends_on:
      app:
        condition: service_healthy
    networks:
      - frontend
    <<: [*hardened, *codestead-managed]
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=32m
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "--metrics", "127.0.0.1:20241", "ready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 64
    logging: *default-logging

networks:
  frontend:
    driver: bridge
  mail-egress:
    driver: bridge
  runner-client:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.29.41.0/24
          gateway: 172.29.41.1
          ip_range: 172.29.41.128/25
  runner-egress:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.name: cdst-run0
    ipam:
      config:
        - subnet: 172.29.40.0/24
          gateway: 172.29.40.1
          ip_range: 172.29.40.128/25
  github-egress:
    driver: bridge
  data:
    driver: bridge
    internal: true
  scanner:
    driver: bridge
    internal: true
  signature-egress:
    driver: bridge

volumes:
  clamav-signatures:

configs:
  cloudflared_config:
    file: ${CLOUDFLARE_CONFIG_FILE:-./infra/cloudflare/config.example.yml}

secrets:
  postgres_password:
    file: ${SECRETS_DIR:-/etc/learncoding/secrets}/postgres_password
  database_url:
    file: ${SECRETS_DIR:-/etc/learncoding/secrets}/database_url
  database_bootstrap_url:
    file: ${SECRETS_DIR:-/etc/learncoding/secrets}/database_bootstrap_url
  database_migrator_url:
    file: ${SECRETS_DIR:-/etc/learncoding/secrets}/database_migrator_url
  database_worker_url:
    file: ${SECRETS_DIR:-/etc/learncoding/secrets}/database_worker_url
  database_ops_url:
    file: ${SECRETS_DIR:-/etc/learncoding/secrets}/database_ops_url
  better_auth_secret:
    file: ${SECRETS_DIR:-/etc/learncoding/secrets}/better_auth_secret
  bootstrap_admin_password:
    file: ${SECRETS_DIR:-/etc/learncoding/secrets}/bootstrap_admin_password
  lost_device_proof_key:
    file: ${SECRETS_DIR:-/etc/learncoding/secrets}/lost_device_proof_key
  deletion_tombstone_key:
    file: ${SECRETS_DIR:-/etc/learncoding/secrets}/deletion_tombstone_key
  credential_master_key:
    file: ${SECRETS_DIR:-/etc/learncoding/secrets}/credential_master_key
  google_client_secret:
    file: ${SECRETS_DIR:-/etc/learncoding/secrets}/google_client_secret
  runner_shared_secret:
    file: ${SECRETS_DIR:-/etc/learncoding/secrets}/runner_shared_secret
  gmail_client_id:
    file: ${SECRETS_DIR:-/etc/learncoding/secrets}/gmail_client_id
  gmail_client_secret:
    file: ${SECRETS_DIR:-/etc/learncoding/secrets}/gmail_client_secret
  gmail_refresh_token:
    file: ${SECRETS_DIR:-/etc/learncoding/secrets}/gmail_refresh_token
  cloudflare_tunnel_credentials:
    file: ${SECRETS_DIR:-/etc/learncoding/secrets}/cloudflare_tunnel_credentials.json
